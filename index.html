<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>DevFlow — Mini Kanban</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-left">
        <h1>DevFlow — Mini Kanban</h1>
        <p id="welcome">Bienvenido/a, <span id="pmName">...</span></p>
      </div>
      <div class="header-right">
        <div id="globalSummary" class="countdown">Cargando resumen...</div>
        <button id="darkModeBtn" class="btn small">🌙 Dark</button>
        <button id="changeUserBtn" class="btn small">Cambiar usuario</button>
        <button id="trelloBtn" class="btn small">Ver Kanban real</button>
      </div>
    </header>

    <main class="main">
      <section class="controls card">
        <h2>Añadir tarea</h2>
        <form id="taskForm">
          <label
            >Nombre tarea
            <input
              id="taskName"
              type="text"
              required
              placeholder="Ej: Implementar login"
            />
          </label>

          <label
            >Asignado a
            <input
              id="assignedTo"
              type="text"
              required
              placeholder="Nombre del desarrollador"
            />
          </label>

          <label
            >Prioridad
            <select id="priority">
              <option value="alta">Alta</option>
              <option value="media" selected>Media</option>
              <option value="baja">Baja</option>
            </select>
          </label>

          <label
            >Descripción
            <textarea
              id="description"
              rows="3"
              placeholder="Breve descripción"
            ></textarea>
          </label>

          <label
            >Carga estimada (horas)
            <input
              id="hours"
              type="number"
              step="0.25"
              min="0.25"
              value="1"
              required
            />
          </label>
          <div class="form-actions">
            <button type="submit" class="btn">Añadir tarea</button>
            <button type="button" id="viewSummary" class="btn outline">
              Ver resumen
            </button>
          </div>
        </form>
      </section>

      <section class="board-area">
        <div class="filter-bar">
          <span>Filtrar:</span>
          <button class="btn-filter active" data-filter="todas">Todas</button>
          <button class="btn-filter" data-filter="alta">🔴 Alta</button>
          <button class="btn-filter" data-filter="media">🟡 Media</button>
          <button class="btn-filter" data-filter="baja">🟢 Baja</button>
        </div>
        <div class="board">
        <div class="column" data-status="pendiente">
          <h3>🕓 Pendiente <span class="col-count">0</span></h3>
          <div class="column-body" id="pendienteList"></div>
        </div>
        <div class="column" data-status="progreso">
          <h3>⚙️ En progreso <span class="col-count">0</span></h3>
          <div class="column-body" id="progresoList"></div>
        </div>
        <div class="column" data-status="finalizada">
          <h3>✅ Finalizada <span class="col-count">0</span></h3>
          <div class="column-body" id="finalizadaList"></div>
        </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <small>Simulacro Examen DWEC: Mini-Kanban.</small>
    </footer>

    <script src="kanban.js"></script>
  </body>
</html>
